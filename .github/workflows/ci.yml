# .github/workflows/ci.yml

name: FC Firmware CI

on:
  push:
    branches: [main]
    paths:
      - "firmware/fc/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "firmware/fc/**"
      - ".github/workflows/ci.yml"

jobs:
  build:
    name: Build STM32H723 Firmware
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Toolchain ────────────────────────────────────────────────────────────
      - name: Install arm-none-eabi toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gcc-arm-none-eabi \
            binutils-arm-none-eabi \
            ninja-build \
            cmake

      - name: Print toolchain versions
        run: |
          arm-none-eabi-gcc --version
          cmake --version
          ninja --version

      # ── Configure ────────────────────────────────────────────────────────────
      # --fresh forces a clean configure on every CI run — no stale cache.
      # CFLAGS is appended by CMake after toolchain flags, so -mcpu / -mfloat-abi
      # are preserved. -Wextra -Werror promote warnings to errors.
      # -Wno-unused-parameter suppresses the HAL callback stub flood.
      - name: Configure (CMake)
        working-directory: firmware/fc
        env:
          CFLAGS: "-Wextra -Werror -Wno-unused-parameter"
        run: cmake --preset Debug --fresh

      # ── Build ─────────────────────────────────────────────────────────────────
      - name: Build
        working-directory: firmware/fc
        run: cmake --build --preset Debug 2>&1 | tee build.log

      # ── Verify ELF ───────────────────────────────────────────────────────────
      # working-directory must match the build steps so relative paths resolve.
      - name: Verify ELF and print memory usage
        working-directory: firmware/fc
        run: |
          ls -lh build/Debug/fc.elf
          arm-none-eabi-size build/Debug/fc.elf

      # ── Upload artifacts ──────────────────────────────────────────────────────
      # if: always() ensures the log uploads even on a failed build.
      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fc-firmware-${{ github.sha }}
          path: |
            firmware/fc/build/Debug/fc.elf
            firmware/fc/build.log
          retention-days: 7
